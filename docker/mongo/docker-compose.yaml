version: '3.8'
services:
  mongodb:
    image: mongodb/mongodb-community-server:8.0.15-ubi9
    container_name: node-ollama-agent-swarm-mongo-server
    ports:
      - '27017:27017'
    volumes:
      - ./mongo_data:/data/db
    restart: always
    # ядро 7.0.0: tcmalloc-google в mongod 8.x сегфолтится через rseq —
    # блокируем syscall (ENOSYS), tcmalloc уходит на fallback-путь
    security_opt:
      - seccomp=./seccomp-mongo-norseq.json
volumes:
  mongo_data:
